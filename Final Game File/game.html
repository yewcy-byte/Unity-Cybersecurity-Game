<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Penetration Education</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <!-- Firebase SDK - use compat version for global firebase object -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script>
      // Initialize Firebase once scripts are loaded
      const firebaseConfig = {
        apiKey: "REPLACE_WITH_FIREBASE_API_KEY",
        authDomain: "unity-cyber-game.firebaseapp.com",
        projectId: "unity-cyber-game",
        storageBucket: "unity-cyber-game.firebasestorage.app",
        messagingSenderId: "1068419443054",
        appId: "1:1068419443054:web:88c1edfadb4cfb7880b97f",
        measurementId: "G-F4VV3K45BR"
      };

      try {
        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
          console.log("Firebase initialized successfully with compat SDK");
        } else if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
          console.log("Firebase app already initialized");
        } else {
          console.error("Firebase SDK not loaded");
        }
      } catch(error) {
        console.error("Firebase initialization error: " + error.message);
      }
    </script>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Penetration Education</div>
      </div>
    </div>
    <script>
      // Initialize bridge for WASM interop before framework loads
      // This ensures SendMessage is available even during WASM initialization
      window.__unityBridge = {
        SendMessage: function(objectName, methodName, message) {
          console.log("SendMessage: " + objectName + "." + methodName + " = " + message);
        },
        GetDocument: function() {
          return this;
        }
      };
      
      // Create a proxy for unityInstance that will be used during initialization
      // This prevents "Cannot read properties of undefined (reading 'SendMessage')" error
      window.unityInstance = {
        SendMessage: function(objectName, methodName, message) {
          console.log("[Init] SendMessage: " + objectName + "." + methodName);
          if (window.actualUnityInstance && window.actualUnityInstance.SendMessage) {
            return window.actualUnityInstance.SendMessage(objectName, methodName, message);
          }
        }
      };
      
      // Set up global error handler to catch initialization issues
      var originalConsoleError = console.error;
      console.error = function() {
        originalConsoleError.apply(console, arguments);
      };
      
      // Define login page URL for game quit redirect - make it global
      window.loginPageUrl = "index.html";
      
      // Expose QuitGame function for Unity to call
      window.QuitGame = function() {
        var url = window.loginPageUrl || "index.html";
        console.log("QuitGame called - attempting to redirect to: " + url);
        if (url && url.trim() !== "" && url.trim() !== "/") {
          // Make URL absolute if it's relative
          if (!url.startsWith("http")) {
            var baseUrl = window.location.origin + (url.startsWith("/") ? "" : "/");
            url = baseUrl + (url.startsWith("/") ? url.substring(1) : url);
          }
          console.log("Final redirect URL: " + url);
          window.location.href = url;
        } else {
          console.log("No valid loginPageUrl provided, redirecting to root");
          window.location.href = window.location.origin + "/index.html";
        }
      };
      
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Webgl build 5.0.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Webgl build 5.0.data",
        frameworkUrl: buildUrl + "/Webgl build 5.0.framework.js",
        codeUrl: buildUrl + "/Webgl build 5.0.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Penetration Education",
        productVersion: "5.0",
        showBanner: unityShowBanner,
        errorHandler: function(err, url, line) {
          console.error("Unity error at " + url + ":" + line + ": " + err);
          return true; // Return true to prevent default handling
        },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "1280px";
        canvas.style.height = "720px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var unityInstance = null;
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        // Patch the global error handler before creating instance
        window.addEventListener("error", function(event) {
          if (event.message && event.message.includes("SendMessage")) {
            console.log("Caught SendMessage error, allowing game to continue...");
            event.preventDefault();
            return true;
          }
        });
        
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((instance) => {
                unityInstance = instance;
                // Store the actual instance so the proxy can forward calls to it
                window.actualUnityInstance = instance;
                // Also update the proxy's SendMessage method
                window.unityInstance.SendMessage = instance.SendMessage.bind(instance);
                
                document.querySelector("#unity-loading-bar").style.display = "none";
                
                // Update bridge with actual SendMessage from instance
                if (instance && instance.SendMessage) {
                  window.__unityBridge.SendMessage = instance.SendMessage.bind(instance);
                }
                
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  instance.SetFullscreen(1);
                };

              }).catch((message) => {
                console.error("Failed to initialize Unity: " + message);
                alert("Failed to initialize game: " + message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
